name: Claude Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'claude[bot]')
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Clear Claude state
        run: rm -rf ~/.claude/plugins ~/.claude/settings.json
        continue-on-error: true

      - name: Set prompt for PR implementation
        if: github.event_name == 'pull_request'
        run: echo "CLAUDE_PROMPT=Implement the plan described in the PR description. Follow the instructions in CLAUDE.md." >> $GITHUB_ENV

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ env.CLAUDE_PROMPT }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 100
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(find:*),mcp__github__create_pull_request"
